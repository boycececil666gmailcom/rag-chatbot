apiVersion: v1
kind: Service
metadata:
  name: chatbot-gateway-service
  namespace: fintech-chatbot
  labels:
    app: chatbot-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: chatbot-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-gateway
  namespace: fintech-chatbot
  labels:
    app: chatbot-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-gateway
  template:
    metadata:
      labels:
        app: chatbot-gateway
    spec:
      containers:
        - name: chatbot-gateway
          image: chatbot-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # Route requests internally to the backend service (ClusterIP service on port 80)
            - name: CHATBOT_BACKEND_URL
              value: "http://chatbot-backend-service"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: ALLOWED_ORIGINS
              value: "*"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
