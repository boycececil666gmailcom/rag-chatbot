apiVersion: v1
kind: Service
metadata:
  name: theme-based-rag-gateway-service
  namespace: theme-based-rag-workflow-jiragraph
  labels:
    app: theme-based-rag-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: theme-based-rag-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: theme-based-rag-gateway
  namespace: theme-based-rag-workflow-jiragraph
  labels:
    app: theme-based-rag-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: theme-based-rag-gateway
  template:
    metadata:
      labels:
        app: theme-based-rag-gateway
    spec:
      containers:
        - name: theme-based-rag-gateway
          image: theme-based-rag-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # Route requests internally to the backend service (ClusterIP service on port 80)
            - name: RAG_BACKEND_URL
              value: "http://theme-based-rag-backend-service"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: ALLOWED_ORIGINS
              value: "*"
            # LangSmith Tracing Configuration
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGSMITH_ENDPOINT
              value: "https://api.smith.langchain.com"
            - name: LANGSMITH_PROJECT
              value: "theme-based-rag-gateway-service"
            - name: LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: langsmith-secrets
                  key: langchain-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
