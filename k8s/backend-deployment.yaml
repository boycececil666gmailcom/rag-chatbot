apiVersion: v1
kind: Service
metadata:
  name: theme-based-rag-backend-service
  namespace: theme-based-rag-workflow
  labels:
    app: theme-based-rag-backend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      name: http
  selector:
    app: theme-based-rag-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: theme-based-rag-backend
  namespace: theme-based-rag-workflow
  labels:
    app: theme-based-rag-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: theme-based-rag-backend
  template:
    metadata:
      labels:
        app: theme-based-rag-backend
    spec:
      containers:
        - name: theme-based-rag-backend
          image: theme-based-rag-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            # Connect to the self-hosted Qdrant headless service
            - name: QDRANT_URL
              value: "http://qdrant-service:6333"
            # Set default active models
            - name: GEMINI_MODEL
              value: "gemini-3.1-flash-lite"
            - name: GEMINI_EMBED_MODEL
              value: "gemini-embedding-001"
            - name: GEMINI_TEMPERATURE
              value: "0.0"
            - name: CHATBOT_THEME
              value: "Fintech SaaS platform"
            # Fetch sensitive key from K8s Secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secrets
                  key: gemini-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
