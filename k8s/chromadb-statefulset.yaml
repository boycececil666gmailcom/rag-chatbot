apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  namespace: fintech-chatbot
  labels:
    app: chromadb
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  # Headless service ensures stable DNS mapping (chromadb-0.chromadb-service)
  clusterIP: None
  selector:
    app: chromadb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromadb
  namespace: fintech-chatbot
spec:
  serviceName: "chromadb-service"
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.5.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: "/chroma/chroma"
            - name: ANONYMOUS_TELEMETRY
              value: "FALSE"
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
  volumeClaimTemplates:
    - metadata:
        name: chroma-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        # In cloud environments, you can specify a storageClassName (e.g. gp2, standard, hostpath)
        # Leaving it blank uses the cluster's default storage class.
        resources:
          requests:
            storage: 10Gi
