apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: theme-based-rag-workflow-jiragraph
  labels:
    app: qdrant
spec:
  publishNotReadyAddresses: true
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
    - port: 6335
      targetPort: 6335
      name: cluster
  # Headless service ensures stable DNS mapping (qdrant-0.qdrant-service)
  clusterIP: None
  selector:
    app: qdrant
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: theme-based-rag-workflow-jiragraph
spec:
  serviceName: "qdrant-service"
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          command:
            - "sh"
            - "-c"
            - "exec /qdrant/qdrant --uri http://$(POD_NAME).qdrant-service.theme-based-rag-workflow-jiragraph.svc.cluster.local:6335 --bootstrap http://qdrant-0.qdrant-service.theme-based-rag-workflow-jiragraph.svc.cluster.local:6335"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: QDRANT__CLUSTER__ENABLED
              value: "true"
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
            - containerPort: 6335
              name: cluster
          livenessProbe:
            httpGet:
              path: /
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
