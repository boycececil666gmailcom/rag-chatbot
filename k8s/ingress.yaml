apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot-ingress
  namespace: fintech-chatbot
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - host: fintech-chatbot.local # In production, replace with your actual registered domain name
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot-gateway-service
                port:
                  number: 80
