name: Fintech RAG Chatbot CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        bash tests/run_unit_tests.sh

    - name: Set up Kind Kubernetes cluster
      if: ${{ env.GEMINI_API_KEY != '' }}
      uses: helm/kind-action@v1.10.0

    - name: Deploy Fintech Chatbot to Kind
      if: ${{ env.GEMINI_API_KEY != '' }}
      run: |
        # Build docker images
        docker build -t chatbot-backend:latest -f src/chatbot_backend/Dockerfile .
        docker build -t chatbot-gateway:latest -f src/api_gateway/Dockerfile .
        
        # Load images into Kind
        kind load docker-image chatbot-backend:latest
        kind load docker-image chatbot-gateway:latest
        
        # Prepare secrets.yaml with base64 encoded key
        B64_KEY=$(echo -n "$GEMINI_API_KEY" | base64)
        cat <<EOF > k8s/secrets.yaml
        apiVersion: v1
        kind: Secret
        metadata:
          name: gemini-secrets
          namespace: fintech-chatbot
        type: Opaque
        data:
          gemini-api-key: $B64_KEY
        EOF
        
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/secrets.yaml
        kubectl apply -f k8s/qdrant-statefulset.yaml
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/gateway-deployment.yaml
        kubectl apply -f k8s/ingress.yaml
        
        # Wait for rollout
        kubectl rollout status statefulset/qdrant -n fintech-chatbot --timeout=90s
        kubectl rollout status deployment/chatbot-backend -n fintech-chatbot --timeout=90s
        kubectl rollout status deployment/chatbot-gateway -n fintech-chatbot --timeout=90s
        
        # Port-forward in the background
        kubectl port-forward service/chatbot-gateway-service -n fintech-chatbot 8080:80 &
        sleep 5

    - name: Run E2E Tests
      run: |
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "Warning: GEMINI_API_KEY secret is not set. Skipping E2E tests."
        else
          bash tests/run_e2e_tests.sh
        fi
